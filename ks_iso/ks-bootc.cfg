text
lang en_US.UTF-8
keyboard --xlayouts='us'
timezone America/New_York --utc
eula --agreed
firstboot --disable
reboot --eject

network --bootproto=dhcp --device=link --activate --onboot=on
selinux --enforcing

rootpw changeme

%pre
mkdir /mnt/oemdrv
mount LABEL=OEMDRV /mnt/oemdrv
%end

## Include Kickstart fragments for Virtual Machines
%pre
if [[ $(hostnamectl chassis) == "vm" ]] ; then
  echo "%include /mnt/oemdrv/ks-include-user-vagrant.cfg" >> /tmp/ks-include.cfg
fi
%end

%include /tmp/ks-include.cfg


##
## Kickstart fragment to use an OCI format container image for installation
##

ostreecontainer --url=/mnt/oemdrv/rhel-bootc-9.8 --transport=oci

zerombr
clearpart --all
#clearpart --all --initlabel --disklabel=gpt
autopart --nohome --type=plain --fstype=xfs

%post --erroronfail
bootc switch --mutate-in-place --transport registry registry.redhat.io/rhel9/rhel-bootc:9.8
# used during automatic image testing as finished marker
if [ -c /dev/ttyS0 ]; then
  # continue on errors here, because we used to omit --erroronfail
  echo "Install finished" > /dev/ttyS0 || true
fi
%end
